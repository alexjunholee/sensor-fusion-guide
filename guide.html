## 13.6 4D Radar 퓨전

4D imaging radar는 센서 퓨전 분야에서 가장 빠르게 부상하는 새로운 모달리티다. 전통적 automotive radar가 거리와 각도만 제공했다면, 4D radar는 거리(range), 방위각(azimuth), 고도(elevation), 도플러 속도(Doppler velocity)의 4차원 정보를 제공한다.

**FMCW radar의 거리/속도 측정 원리**: 4D radar의 대부분은 FMCW(Frequency-Modulated Continuous Wave) 방식을 사용한다. 송신 신호의 주파수를 시간에 따라 선형으로 증가(chirp)시키고, 반사 신호와의 비트 주파수(beat frequency)로 거리를, chirp 간 위상 변화로 속도를 측정한다:

$$R = \frac{c \cdot f_b}{2 \cdot S}$$

여기서 $R$은 타겟까지의 거리, $c$는 광속, $f_b$는 비트 주파수, $S$는 chirp의 주파수 변화율(Hz/s)이다.

$$v = \frac{\lambda \cdot \Delta\phi}{4\pi \cdot T_c}$$

여기서 $v$는 타겟의 radial velocity, $\lambda$는 캐리어 파장, $\Delta\phi$는 연속된 두 chirp 사이의 위상 변화, $T_c$는 chirp 주기이다.

### 13.6.1 악천후 Robustness

4D radar의 핵심 가치는 **악천후에서의 강건성**이다:

| 조건 | 카메라 | LiDAR | 4D Radar |
|------|--------|-------|----------|
| 맑은 날 | 최고 | 최고 | 양호 |
| 비 | 저하 | 약간 저하 | 정상 |
| 안개 | 심각 저하 | 심각 저하 | 정상 |
| 눈/먼지 | 심각 저하 | 심각 저하 | 정상 |
| 야간 | 심각 저하 | 정상 | 정상 |
| 직사광선 | 저하 | 정상 | 정상 |

Radar의 파장(밀리미터파)이 물방울, 안개 입자, 먼지보다 훨씬 크기 때문에, 이들에 의한 산란이 거의 없다. 이는 LiDAR(근적외선)와 카메라(가시광선)의 근본적 한계를 보완한다.

### 13.6.2 4D Radar + Camera Fusion

4D radar와 카메라의 퓨전은 "악천후에서도 동작하는 저비용 인식 시스템"을 목표로 한다:

**BEV 기반 퓨전**: 카메라 이미지에서 BEV feature를 추출하고 (LSS 또는 BEVFormer 방식), radar 포인트를 BEV 공간에 투영하여 결합한다.

**Radar의 Doppler 정보 활용**: 4D radar는 각 포인트의 시선 방향 속도(radial velocity)를 직접 측정한다. 이는 카메라나 LiDAR에는 없는 고유한 정보로:

- **동적 객체 분류**: 정적 배경과 움직이는 객체를 Doppler로 즉시 구분.
- **Ego-motion estimation**: 정적 포인트의 Doppler로 자차 속도를 추정 (IMU 없이도 가능).
- **Tracking 지원**: 객체의 속도 정보를 tracking에 직접 사용.

$$v_r = (\mathbf{v}_{\text{obj}} - \mathbf{v}_{\text{ego}}) \cdot \hat{\mathbf{r}}$$

여기서 $v_r$은 측정된 radial velocity, $\mathbf{v}_{\text{obj}}$는 객체 속도, $\mathbf{v}_{\text{ego}}$는 ego 속도, $\hat{\mathbf{r}}$은 radar → 타겟 방향 단위 벡터($\|\hat{\mathbf{r}}\| = 1$)다. 정적 객체($\mathbf{v}_{\text{obj}} = \mathbf{0}$)의 경우 $v_r = -\mathbf{v}_{\text{ego}} \cdot \hat{\mathbf{r}}$이 된다.

### 13.6.3 Radar Odometry의 최근 발전

Radar odometry는 2020년 이후 급격히 발전하고 있다:

**FMCW radar odometry**: scanning FMCW radar (Navtech 등)에서의 odometry. Range-azimuth 이미지에서 특징점을 추출하고 매칭하여 ego-motion을 추정한다.

**4D radar odometry**: 4D radar 포인트 클라우드에서의 odometry. LiDAR odometry와 유사한 접근(ICP, feature matching)이 가능하지만, 해상도가 낮고 노이즈가 크다는 도전이 있다.

**Doppler 기반 ego-velocity estimation**: 정적 포인트의 Doppler 측정으로 ego-velocity를 직접 추정한다. RANSAC으로 동적 포인트를 제거하고, 정적 포인트의 Doppler로 $\mathbf{v}_{\text{ego}}$를 추정하는 방식:

$$v_r^{(k)} = -\mathbf{v}_{\text{ego}} \cdot \hat{\mathbf{r}}^{(k)} \quad \text{(정적 포인트)}$$

여기서 $k$는 포인트 인덱스. 최소 3개의 비공선(non-collinear) 포인트로 3D 속도 벡터를 추정할 수 있다.

```python
def estimate_ego_velocity_from_doppler(radar_points, doppler_values, 
                                        directions, ransac_threshold=0.3,
                                        max_iterations=100):
    """
    Radar Doppler 측정으로 ego-velocity 추정.
    
    정적 포인트의 Doppler: v_r = -v_ego · r_hat
    이는 선형 시스템으로 풀 수 있다.
    
    Args:
        radar_points: (N, 3) radar 포인트 좌표
        doppler_values: (N,) 각 포인트의 radial velocity
        directions: (N, 3) 각 포인트의 방향 단위 벡터
        ransac_threshold: RANSAC 인라이어 임계값 (m/s)
        max_iterations: RANSAC 최대 반복 수
        
    Returns:
        v_ego: (3,) ego-velocity 벡터
        inlier_mask: (N,) 정적 포인트 마스크
    """
    N = len(doppler_values)
    best_inliers = np.zeros(N, dtype=bool)
    best_v_ego = np.zeros(3)
    
    for _ in range(max_iterations):
        # 3개 포인트 랜덤 샘플링
        idx = np.random.choice(N, 3, replace=False)
        
        # 선형 시스템: v_r = -directions @ v_ego
        # A @ v_ego = b
        A = -directions[idx]  # (3, 3)
        b = doppler_values[idx]  # (3,)
        
        try:
            v_ego_candidate = np.linalg.solve(A, b)
        except np.linalg.LinAlgError:
            continue
        
        # 모든 포인트에 대한 잔차 계산
        predicted_doppler = -directions @ v_ego_candidate
        residuals = np.abs(doppler_values - predicted_doppler)
        
        inliers = residuals < ransac_threshold
        
        if np.sum(inliers) > np.sum(best_inliers):
            best_inliers = inliers
            best_v_ego = v_ego_candidate
    
    # 인라이어로 재추정 (least squares)
    if np.sum(best_inliers) >= 3:
        A = -directions[best_inliers]
        b = doppler_values[best_inliers]
        best_v_ego = np.linalg.lstsq(A, b, rcond=None)[0]
    
    return best_v_ego, best_inliers


def separate_static_dynamic(radar_points, doppler_values, directions,
                             v_ego, threshold=0.5):
    """
    Ego-velocity를 이용하여 정적/동적 포인트 분류.
    
    Args:
        v_ego: 추정된 ego-velocity (3,)
        threshold: 정적/동적 분류 임계값 (m/s)
        
    Returns:
        static_mask: (N,) 정적 포인트
        dynamic_mask: (N,) 동적 포인트
        object_velocities: (N,) 각 포인트의 추정 객체 속도 (radial)
    """
    # 정적 가정 하의 예상 Doppler
    expected_doppler = -directions @ v_ego
    
    # 잔차 = 실제 Doppler - 예상 Doppler
    residuals = doppler_values - expected_doppler
    
    static_mask = np.abs(residuals) < threshold
    dynamic_mask = ~static_mask
    
    # 동적 포인트의 객체 속도 (radial component)
    object_velocities = residuals  # v_obj · r_hat
    
    return static_mask, dynamic_mask, object_velocities
```

### 13.6.4 대표 데이터셋과 벤치마크

| 데이터셋 | 센서 | 환경 | 특징 |
|----------|------|------|------|
| **[Boreas](https://arxiv.org/abs/2203.10168)** (Burnett et al. 2023) | Camera, LiDAR, Radar, GNSS/IMU | 도심 (다양한 날씨) | 1년간 동일 경로 반복, 악천후 포함 |
| **RadarScenes** | Radar, Camera, LiDAR | 도심 | 기존 automotive radar 포인트 + semantic labels (point-level annotation) |
| **nuScenes** | Camera, LiDAR, Radar | 도심 | 5개 radar 포함, 악천후 일부 |
| **View-of-Delft** | Camera, LiDAR, 4D Radar | 도심 | 4D radar + 3D annotation |

**최근 주요 발전 (2024~2025)**:

- **[Snail-Radar](https://arxiv.org/abs/2407.11705)** (2024): 4D radar 기반 SLAM 평가를 위한 최초의 대규모 다양성 벤치마크로, 핸드헬드·자전거·SUV 세 플랫폼에서 다양한 날씨/조명 조건으로 수집된 44개 시퀀스를 제공한다.
- **[4D Radar-Inertial Odometry](https://arxiv.org/abs/2412.13639)** (2024): 3D Gaussian 기반 radar scene representation과 multi-hypothesis scan matching을 제안하여 voxel 방식 대비 더 정밀한 radar odometry를 달성했다.

4D radar 퓨전은 아직 초기 단계이지만, 자율주행의 전천후 운용을 위한 핵심 기술로 빠르게 발전하고 있다. 특히 Doppler 정보를 활용한 ego-motion estimation과 동적 객체 분류는 LiDAR나 카메라에서 불가능한 고유한 기능이다.

## 마무리

이 가이드는 센서 모델링(Ch.2)에서 출발하여 캘리브레이션(Ch.3), 상태 추정 이론(Ch.4), 특징점 매칭(Ch.5), VO/VIO(Ch.6), LiDAR odometry(Ch.7), 멀티센서 퓨전(Ch.8), Place Recognition(Ch.9), Loop Closure(Ch.10), 공간 표현(Ch.11), 실전 시스템(Ch.12), 그리고 연구 프런티어(Ch.13)까지 — 센서 퓨전의 전체 파이프라인을 추적해왔다.

이 분야의 핵심 서사를 다시 한번 정리하면:

1. **전통 방법은 여전히 기반이다.** 칼만 필터, ICP, RANSAC, 팩터 그래프 — 수십 년 전에 제안된 이 방법들이 현대 시스템의 뼈대를 이루고 있다.
2. **딥러닝은 지각(perception)에서 혁신을 일으켰다.** 특징점 매칭, 깊이 추정, Place Recognition 등 "무엇을 보는가"의 영역에서 학습 기반 방법이 전통을 압도한다.
3. **추론(inference)에서는 전통과 학습이 공존한다.** 상태 추정 backend는 여전히 최적화 기반이 지배적이지만, DROID-SLAM처럼 미분 가능 최적화로 경계를 허무는 시도가 진행 중이다.
4. **Foundation model이 새로운 변곡점이다.** DINOv2, SAM 등 범용 모델의 표현력이 센서 퓨전 파이프라인 곳곳에 침투하고 있으며, 이 흐름은 가속될 것이다.

센서 퓨전은 "센서 데이터를 합치는 기술"이 아니라, **불완전한 관측으로부터 세상을 이해하는 기술**이다. 이 가이드가 그 이해의 출발점이 되기를 바란다.

<script>
(function() {
  'use strict';

  // ---- Marked configuration ----
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; } catch(e) {}
      return code;
    },
    breaks: false,
    gfm: true
  });
  // Disable strikethrough: ~ is used as range separator
  marked.use({ renderer: { del: function(token) { return '~' + (token.text || token) + '~'; } } });

  // ---- Protect math from marked.js ----
  // marked.js treats _ as emphasis, which breaks LaTeX subscripts.
  // Strategy: extract all math expressions before parsing, replace with placeholders,
  // parse Markdown, then restore math and render with KaTeX.
  function protectMath(src) {
    var placeholders = [];
    var idx = 0;

    // Protect code blocks first (``` ... ```)
    var codeBlocks = [];
    src = src.replace(/```[\s\S]*?```/g, function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });

    // Protect inline code (` ... `)
    var inlineCodes = [];
    src = src.replace(/`[^`\n]+`/g, function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });

    // Protect display math ($$...$$)
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });

    // Protect inline math ($...$) — but not lone $ signs
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });

    // Restore code blocks
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) {
      return codeBlocks[parseInt(i)];
    });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) {
      return inlineCodes[parseInt(i)];
    });

    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i)];
      try {
        return katex.renderToString(p.math, {
          displayMode: p.display,
          throwOnError: false,
          trust: true
        });
      } catch(e) {
        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  // ---- Render markdown ----
  var mdSource = document.getElementById('md-source').value;
  // Fix: marked.js doesn't recognize **text** when immediately followed by Korean characters
  mdSource = mdSource.replace(/\*\*([^*\n]+)\*\*(?=[가-힣])/g, '<strong>$1</strong>');
  var contentEl = document.getElementById('content');
  var loadingEl = document.getElementById('loading');

  requestAnimationFrame(function() {
    var mathData = protectMath(mdSource);
    var html = marked.parse(mathData.src);
    html = restoreAndRenderMath(html, mathData.placeholders);
    contentEl.innerHTML = html;
    contentEl.style.display = 'block';
    loadingEl.style.display = 'none';

    // Tag person-quote blockquotes
    contentEl.querySelectorAll('blockquote').forEach(function(bq) {
      var text = bq.textContent;
      if (text.indexOf('\u2014') !== -1 && !bq.querySelector('strong')) {
        bq.classList.add('quote-person');
      }
    });

    // Build TOC, setup interactions
    buildTOC();
    setupScrollTracking();
    setupSearch();
    setupProgressBar();
    setupMobileMenu();
    setupKeyboard();
  });

  // ---- Build Table of Contents ----
  function buildTOC() {
    var headings = contentEl.querySelectorAll('h2, h3');
    var tocContainer = document.getElementById('toc-container');
    var fragment = document.createDocumentFragment();

    var groupFirstChapter = {
      '1.1': '기초 (Foundations)',
      '4.1': '방법론 기초 (Methods)',
      '6.1': 'Odometry & Fusion',
      '9.1': 'Place Recognition & Loop Closure',
      '11.1': '표현 · 실전 · 미래'
    };


    function getGroupLabel(text) {
      var trimmed = text.trim();
      for (var prefix in groupFirstChapter) {
        if (trimmed.indexOf(prefix) === 0) {
          var label = groupFirstChapter[prefix];
          delete groupFirstChapter[prefix];
          return label;
        }
      }
      return null;
    }

    headings.forEach(function(heading) {
      var id = heading.id;
      if (!id) {
        id = heading.textContent
          .toLowerCase()
          .replace(/[^\w\s가-힣-]/g, '')
          .replace(/\s+/g, '-')
          .substring(0, 60);
        heading.id = id;
      }

      if (heading.tagName === 'H2') {
        var groupLabel = getGroupLabel(heading.textContent);
        if (groupLabel) {
          var label = document.createElement('div');
          label.className = 'toc-group-label';
          label.textContent = groupLabel;
          fragment.appendChild(label);
        }
      }

      var link = document.createElement('a');
      link.className = 'toc-item toc-' + heading.tagName.toLowerCase();
      link.href = '#' + id;
      link.textContent = heading.textContent;
      link.dataset.headingId = id;

      link.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.getElementById(id);
        if (target) {
          var offset = 60;
          var top = target.getBoundingClientRect().top + window.scrollY - offset;
          window.scrollTo({ top: top, behavior: 'smooth' });
        }
        closeMobileSidebar();
      });

      fragment.appendChild(link);
    });

    tocContainer.appendChild(fragment);
  }

  // ---- Scroll tracking ----
  function setupScrollTracking() {
    var headings = contentEl.querySelectorAll('h2, h3');
    var tocItems = document.querySelectorAll('.toc-item');
    if (headings.length === 0) return;

    var tocMap = {};
    tocItems.forEach(function(item) {
      tocMap[item.dataset.headingId] = item;
    });

    var currentActive = null;

    var observer = new IntersectionObserver(function(entries) {
      var topHeading = null;
      var topOffset = Infinity;

      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var rect = entry.target.getBoundingClientRect();
          if (rect.top < topOffset) {
            topOffset = rect.top;
            topHeading = entry.target;
          }
        }
      });

      if (topHeading) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[topHeading.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
          var tocContainer = document.getElementById('toc-container');
          var itemRect = item.getBoundingClientRect();
          var containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) {
            item.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        }
      }
    }, {
      rootMargin: '-60px 0px -70% 0px',
      threshold: 0
    });

    headings.forEach(function(h) { observer.observe(h); });

    var ticking = false;
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          updateActiveFromScroll(headings, tocMap);
          ticking = false;
        });
        ticking = true;
      }
    });

    function updateActiveFromScroll(headings, tocMap) {
      var found = null;
      var scrollTop = window.scrollY + 80;

      for (var i = headings.length - 1; i >= 0; i--) {
        if (headings[i].offsetTop <= scrollTop) {
          found = headings[i];
          break;
        }
      }

      if (found) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[found.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
        }
      }
    }
  }

  // ---- Search ----
  function setupSearch() {
    var searchInput = document.getElementById('search-input');
    var tocItems = document.querySelectorAll('.toc-item');
    var groupLabels = document.querySelectorAll('.toc-group-label');
    var noResults = document.getElementById('toc-no-results');

    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();

      if (!query) {
        tocItems.forEach(function(item) { item.classList.remove('toc-hidden'); });
        groupLabels.forEach(function(label) { label.classList.remove('toc-hidden'); });
        noResults.style.display = 'none';
        return;
      }

      var matchCount = 0;
      tocItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        if (text.includes(query)) {
          item.classList.remove('toc-hidden');
          matchCount++;
        } else {
          item.classList.add('toc-hidden');
        }
      });

      groupLabels.forEach(function(label) { label.classList.add('toc-hidden'); });
      noResults.style.display = matchCount === 0 ? 'block' : 'none';
    });
  }

  // ---- Progress bar ----
  function setupProgressBar() {
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;

    function updateProgress() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + '%';
    }

    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          updateProgress();
          ticking = false;
        });
        ticking = true;
      }
    });

    updateProgress();
  }

  // ---- Mobile menu ----
  function setupMobileMenu() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.querySelector('#sidebar-overlay');

    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });

    overlay.addEventListener('click', closeMobileSidebar);
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.querySelector('#sidebar-overlay').classList.remove('visible');
  }

  // ---- Keyboard shortcut ----
  function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
  }

})();
